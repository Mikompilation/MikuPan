name: Release

on:
  workflow_dispatch:
    inputs:
      Version:
        description: 'Version number e.g. 1.0'
        required: true
        default: '0.0.1'

env:
  BUILD_TYPE: Release
  BUILD_STATIC: true

jobs:
  build:
    runs-on: ${{ matrix.sys.os }}
    strategy:
      matrix:
        sys:
          - { os: windows-latest, shell: pwsh, name: windows }
          - { os: ubuntu-latest,  shell: bash, name: linux  }
          - { os: macos-latest,   shell: bash, name: macos  }
    defaults:
      run:
        shell: ${{ matrix.sys.shell }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0   # full history + tags so the version header resolves

      # GCC-only codebase (see CMakeLists / sdk headers) — Windows must use MinGW.
      - name: Set up MinGW (Windows)
        if: ${{ matrix.sys.os == 'windows-latest' }}
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Install Dependencies
        if: ${{ matrix.sys.os == 'ubuntu-latest' }}
        run: |
          sudo apt update
          sudo apt install zip libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev build-essential git make pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libusb-1.0-0-dev
          sudo apt update
          sudo apt upgrade

      - name: Configure CMake (Windows / MinGW)
        if: ${{ matrix.sys.os == 'windows-latest' }}
        run: cmake -B ${{github.workspace}}/build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBUILD_STATIC=${{env.BUILD_STATIC}}

      - name: Configure CMake (Unix)
        if: ${{ matrix.sys.os != 'windows-latest' }}
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBUILD_STATIC=${{env.BUILD_STATIC}}

      - name: Build
        run: |
          cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j 12 --target MikuPan

      - name: Zip Windows App
        if: ${{ matrix.sys.os == 'windows-latest' }}
        working-directory: build
        shell: pwsh
        run: |
          Compress-Archive -Path MikuPan/* -DestinationPath MikuPan_${{ matrix.sys.name }}_v${{ github.event.inputs.version }}.zip

      - name: Zip OSX App
        if: ${{ matrix.sys.os == 'macos-latest' }}
        working-directory: build/
        shell: pwsh
        run: |
          Get-ChildItem -Path MikuPan/* | Compress-Archive -DestinationPath MikuPan_${{ matrix.sys.name }}_v${{ github.event.inputs.version }}.zip

      - name: Zip Ubuntu App
        if: ${{ matrix.sys.os == 'ubuntu-latest' }}
        working-directory: build
        run: |
          zip -r MikuPan_${{ matrix.sys.name }}_v${{ github.event.inputs.version }}.zip MikuPan/*

      - name: Release
        uses: ncipollo/release-action@a2e71bdd4e7dab70ca26a852f29600c98b33153e
        with:
          draft: false
          allowUpdates: true
          replacesArtifacts: false
          name: "MikuPan v${{ github.event.inputs.version }}"
          tag: "v${{ github.event.inputs.version }}"
          artifacts: build/MikuPan_${{ matrix.sys.name }}_v${{ github.event.inputs.version }}.zip
