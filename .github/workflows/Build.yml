name: Build Obscura

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history + tags so the version header resolves

    # The codebase uses GCC-only extensions (__attribute__((mode(TI))),
    # ((optimize)), ((aligned))) plus the -static link flag, and links the
    # prebuilt MinGW FFmpeg import libs in extern/ffmpeg. It cannot build with
    # MSVC, so the Windows runner must use the MinGW toolchain.
    - name: Set up MinGW (Windows)
      if: ${{ matrix.os == 'windows-latest' }}
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Install Dependencies
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
          sudo apt update
          sudo apt install zip libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev build-essential git make pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libusb-1.0-0-dev
          sudo apt update
          sudo apt upgrade

    - name: Configure CMake (Windows / MinGW)
      if: ${{ matrix.os == 'windows-latest' }}
      run: cmake -B ${{github.workspace}}/build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Configure CMake (Unix)
      if: ${{ matrix.os != 'windows-latest' }}
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: |
        cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --target MikuPan
