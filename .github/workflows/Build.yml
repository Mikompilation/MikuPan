name: Build Obscura

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  shaders:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history + tags so the version header resolves

    - name: Set up MSYS2 (Windows)
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          git
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja

    - name: Build shaders (Windows / MinGW)
      shell: msys2 {0}
      run: |
        git config --global --add safe.directory '*'
        cmake -E remove_directory resources/shaders/dxil
        cmake -E remove_directory resources/shaders/msl
        cmake -E remove_directory resources/shaders/spirv
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DMIKUPAN_COMPILE_SHADERS=ON
        cmake --build build --target compile_shaders

    - name: Upload compiled shaders
      uses: actions/upload-artifact@v4
      with:
        name: compiled-shaders
        if-no-files-found: error
        path: |
          resources/shaders/dxil
          resources/shaders/msl
          resources/shaders/spirv

  build:
    needs: shaders
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history + tags so the version header resolves

    - name: Download compiled shaders
      uses: actions/download-artifact@v4
      with:
        name: compiled-shaders
        path: resources/shaders

    # The codebase uses GCC-only extensions (__attribute__((mode(TI))),
    # ((optimize)), ((aligned))) plus the -static link flag, and links the
    # prebuilt MinGW FFmpeg import libs in extern/ffmpeg. It cannot build with
    # MSVC, so the Windows runner builds with MinGW via MSYS2.
    - name: Set up MSYS2 (Windows)
      if: ${{ matrix.os == 'windows-latest' }}
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          git
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja

    - name: Install Dependencies
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
          sudo apt update
          sudo apt install zip libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev build-essential git make pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libusb-1.0-0-dev
          sudo apt update
          sudo apt upgrade

    - name: Build (Windows / MinGW)
      if: ${{ matrix.os == 'windows-latest' }}
      shell: msys2 {0}
      run: |
        git config --global --add safe.directory '*'
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DMIKUPAN_COMPILE_SHADERS=OFF
        cmake --build build --target MikuPan

    - name: Build (Unix)
      if: ${{ matrix.os != 'windows-latest' }}
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DMIKUPAN_COMPILE_SHADERS=OFF
        cmake --build build --config ${{ env.BUILD_TYPE }} --target MikuPan
